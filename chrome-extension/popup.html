<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynasty Destroyer Sync</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #111827;
        background: #f9fafb;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 13px;
        font-weight: 700;
      }

      input[type="text"],
      input[type="url"] {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      button {
        width: 100%;
        padding: 9px 12px;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        background: #dc2626;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      #status {
        min-height: 18px;
        margin-top: 10px;
        color: #047857;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Dynasty Destroyer Sync</h1>

    <label for="apiUrl">
      API URL
      <input id="apiUrl" type="url" autocomplete="off">
    </label>

    <label for="mockDraftId">
      Mock Draft ID
      <input id="mockDraftId" type="text" autocomplete="off">
    </label>

    <label class="toggle-row" for="syncEnabled">
      <span>Sync Enabled</span>
      <input id="syncEnabled" type="checkbox">
    </label>

    <button id="saveButton" type="button">Save</button>
    <div id="status" role="status" aria-live="polite"></div>

    <script src="popup.js"></script>
  </body>
</html>
